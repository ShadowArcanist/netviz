name: Build and Publish

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker tag"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    if: github.repository == 'ShadowArcanist/netviz'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      image: ${{ steps.refs.outputs.image }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="sha-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Prepare image reference
        id: refs
        shell: bash
        run: |
          echo "image=ghcr.io/shadowarcanist/netviz" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build ${{ matrix.arch }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.tag }}-${{ matrix.arch }}
            ${{ needs.prepare.outputs.image }}:latest-${{ matrix.arch }}
          cache-from: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ needs.prepare.outputs.image }}:buildcache-${{ matrix.arch }},mode=max

  merge-manifest:
    name: Merge Manifest
    needs:
      - prepare
      - build-push
    runs-on: ubuntu-24.04

    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish multi-arch manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.tag }}-amd64" \
            "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.tag }}-arm64" \
            --tag "${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.tag }}" \
            --tag "${{ needs.prepare.outputs.image }}:latest"
